version: '3.8'

services:
  # Backend Laravel (App)
  # Backend Laravel (App)
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: feeder_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: sh -c "php artisan serve --host=0.0.0.0 --port=8000"
    # Hapus baris environment DB di sini supaya dia baca dari file .env
    volumes:
      - ./backend:/var/www/html

  # Database
  db:
    image: mysql:8.0
    container_name: feeder_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: feeder_db
      MYSQL_USER: sail
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # Frontend React (Vite Dev Server)
  frontend:
    image: node:20-alpine
    container_name: feeder_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - CHOKIDAR_USEPOLLING=true
volumes:
  db_data:
